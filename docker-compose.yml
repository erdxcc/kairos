# Local/self-host PostgreSQL. The worker and web app read DATABASE_URL;
# without Docker you can also use the embedded PGlite driver
# (DATABASE_URL=pglite://.data/kairos-db) for development.
services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: kairos
            POSTGRES_PASSWORD: kairos
            POSTGRES_DB: kairos
        ports:
            - '5432:5432'
        volumes:
            - kairos-pgdata:/var/lib/postgresql/data

volumes:
    kairos-pgdata:
